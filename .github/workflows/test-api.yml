name: Test API

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  failover:
    runs-on: ubuntu-latest
    services:
      mock-server:
        image: livekit/test-server:latest
        ports:
          - 9999:9999
          - 10000:10000
          - 10001:10001
          - 10002:10002
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6

      - name: Set up Opus
        run: |
          sudo apt-get update
          sudo apt-get install -y libsoxr-dev libopus-dev libopusfile-dev

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 1.26.0

      - name: Wait for mock server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:9999/settings/regions >/dev/null && exit 0
            sleep 1
          done
          echo "mock server did not become ready" && exit 1

      - name: Run API tests
        run: go test -v -count=1 -run '^TestAPI_' .
